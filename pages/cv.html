<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — CV</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root[data-theme="light"] {
    --bg: #F5F0E8; --bg2: #EDE7D9; --text: #1A1612;
    --muted: #7A7268; --accent: #C4582A; --border: #C8BFB0; --card: #FDFAF5;
  }
  :root[data-theme="dark"] {
    --bg: #0F0D0B; --bg2: #1A1612; --text: #F0EBE1;
    --muted: #9A9285; --accent: #E07040; --border: #2E2A25; --card: #181410;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg); color: var(--text);
    transition: background 0.4s, color 0.4s;
    min-height: 100vh;
  }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.4rem 3rem;
    background: var(--bg); border-bottom: 1px solid var(--border);
    transition: background 0.4s, border-color 0.4s;
  }
  .nav-logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.05em; color: var(--text); text-decoration: none; }
  .nav-links { display: flex; gap: 2rem; align-items: center; }
  .nav-links a { font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); }
  .theme-btn {
    background: none; border: 1px solid var(--border); color: var(--muted); cursor: pointer;
    width: 36px; height: 36px; border-radius: 50%; font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .theme-btn:hover { border-color: var(--accent); color: var(--accent); }
  .page-wrapper { padding-top: 80px; max-width: 1100px; margin: 0 auto; padding-left: 3rem; padding-right: 3rem; }
  .page-header {
    padding: 3rem 0 1.5rem; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .page-title { font-size: 1.6rem; font-weight: 600; letter-spacing: -0.01em; }
  .btn-download {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.7rem 1.4rem; background: var(--accent); color: #fff;
    text-decoration: none; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.05em; transition: opacity 0.2s;
  }
  .btn-download:hover { opacity: 0.85; }
  .pdf-container { margin: 2rem 0 4rem; border: 1px solid var(--border); background: var(--card); transition: background 0.4s, border-color 0.4s; }
  .pdf-toolbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.65rem 1.25rem; border-bottom: 1px solid var(--border);
    background: var(--bg2); transition: background 0.4s;
  }
  .pdf-toolbar-label { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .pdf-embed-wrapper { width: 100%; height: 80vh; min-height: 600px; }
  iframe.pdf-embed { width: 100%; height: 100%; display: block; border: none; }
  footer {
    padding: 2rem 3rem; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.7rem; letter-spacing: 0.05em; color: var(--muted);
  }
  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    .page-wrapper { padding-left: 1.5rem; padding-right: 1.5rem; }
    .page-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
    .pdf-embed-wrapper { height: 65vh; }
    footer { flex-direction: column; gap: 0.5rem; text-align: center; padding: 1.5rem; }
  }
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">A.R.</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="cv.html" class="active">CV</a>
    <a href="contacts.html">Contact</a>
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">☀</button>
  </div>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <h1 class="page-title">Curriculum Vitae</h1>
    <a href="cv.pdf" download class="btn-download">↓ Download PDF</a>
  </div>
  <div class="pdf-container">
    <div class="pdf-toolbar">
      <span class="pdf-toolbar-label">cv.pdf</span>
    </div>
    <div class="pdf-embed-wrapper">
      <iframe class="pdf-embed" src="cv.pdf" title="Curriculum Vitae"></iframe>
    </div>
  </div>
</div>
<footer>
  <span>© 2026 Alessandro Rossi</span>
  <span>Milan, Italy</span>
</footer>
<script>
  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.querySelector('.theme-btn').textContent = isDark ? '☀' : '☽';
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
  }
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
    document.querySelector('.theme-btn').textContent = saved === 'dark' ? '☽' : '☀';
  }
</script>
</body>
</html>
